# DPI-Engine-Pro Configuration File
# Lines starting with # are comments

[files]
csv_file   = data/training_flows.csv
model_file = data/model.txt
rules_file = data/rules.txt

[ml]
use_random_forest = true
rf_trees          = 10
tree_max_depth    = 5
min_confidence    = 0.6

[engine]
worker_threads  = 4
flow_timeout_sec  = 120
cache_timeout_sec = 300

[output]
verbose            = false
print_blocked_only = false